name: Diagnose cikada-test.lauresta.com

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: [self-hosted, lauresta-vps]
    steps:
      - name: Runner identity and docker/systemd access
        run: |
          {
            echo "## Runner identity"
            echo '```'
            whoami
            id
            echo '-- docker --'
            (docker ps >/dev/null 2>&1 && echo "docker ps: OK (no sudo needed)") || echo "docker ps: FAILED"
            (sudo -n docker ps >/dev/null 2>&1 && echo "sudo -n docker ps: OK") || echo "sudo -n docker ps: FAILED (no passwordless sudo for this user/command)"
            echo "docker group membership: $(groups | tr ' ' '\n' | grep -x docker || echo 'not in docker group')"
            echo "docker.sock perms: $(ls -la /var/run/docker.sock 2>&1)"
            echo '-- systemd traefik service --'
            (systemctl status traefik --no-pager 2>&1 | head -20) || echo "no systemd unit named traefik, or systemctl not permitted"
            echo '```'
          } 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true

      - name: Deployed dynamic config on disk
        run: |
          {
            echo "## /opt/traefik/dynamic/mes-test.yml"
            echo '```'
            if [ -r /opt/traefik/dynamic/mes-test.yml ]; then
              echo "-- mtime: $(stat -c '%y' /opt/traefik/dynamic/mes-test.yml 2>&1) --"
              grep -n "cikada-test\|mes-test" /opt/traefik/dynamic/mes-test.yml || echo "(grep found no matching lines)"
            else
              echo "file not readable by this user, or does not exist at this path: $(ls -la /opt/traefik/dynamic/ 2>&1)"
            fi
            echo '```'
          } 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true

      - name: Search filesystem for Traefik data / ACME storage (no docker needed)
        run: |
          {
            echo "## Filesystem search for traefik data dirs / acme.json"
            echo '```'
            find /opt /etc /var/lib /srv -maxdepth 5 \( -iname "acme.json" -o -iname "traefik.yml" -o -iname "traefik.yaml" -o -iname "traefik.toml" \) 2>/dev/null | head -50
            echo '-- if any acme.json found above, checking for cikada-test.lauresta.com in it --'
            for f in $(find /opt /etc /var/lib /srv -maxdepth 5 -iname "acme.json" 2>/dev/null); do
              echo "-- $f --"
              (grep -o "cikada-test.lauresta.com" "$f" 2>&1 | head -3) || echo "(not readable, or no match)"
            done
            echo '```'
          } 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true

      - name: Backend reachability (portal-webui 10.11.12.15:5010)
        run: |
          {
            echo "## Backend check"
            echo '```'
            curl -sS -m 8 -o /dev/null -w 'HTTP %{http_code} in %{time_total}s\n' http://10.11.12.15:5010/ || echo "curl to backend failed"
            echo '```'
          } 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true

      - name: HTTPS checks - public path vs direct-to-Traefik, new host vs known-good host
        run: |
          {
            echo "## HTTPS checks"
            echo '```'
            echo "-- cikada-test.lauresta.com via public DNS (through Cloudflare) --"
            curl -sS -m 20 -o /dev/null -w 'HTTP %{http_code} in %{time_total}s\n' https://cikada-test.lauresta.com/portal/ || echo "curl failed/timed out"
            echo "-- cikada-test.lauresta.com direct to 127.0.0.1 (bypasses Cloudflare, hits Traefik locally, SNI preserved) --"
            curl -sS -m 20 -o /dev/null -w 'HTTP %{http_code} in %{time_total}s\n' --resolve cikada-test.lauresta.com:443:127.0.0.1 https://cikada-test.lauresta.com/portal/ || echo "curl failed/timed out"
            echo "-- known-good comparison: mes-test.lauresta.com direct to 127.0.0.1 --"
            curl -sS -m 20 -o /dev/null -w 'HTTP %{http_code} in %{time_total}s\n' --resolve mes-test.lauresta.com:443:127.0.0.1 https://mes-test.lauresta.com/portal/ || echo "curl failed/timed out"
            echo "-- TLS cert Traefik presents for cikada-test.lauresta.com (direct, bypasses Cloudflare) --"
            echo | openssl s_client -connect 127.0.0.1:443 -servername cikada-test.lauresta.com 2>&1 | openssl x509 -noout -subject -dates -issuer 2>&1 || echo "openssl check failed"
            echo "-- TLS cert Traefik presents for mes-test.lauresta.com (direct, known-good comparison) --"
            echo | openssl s_client -connect 127.0.0.1:443 -servername mes-test.lauresta.com 2>&1 | openssl x509 -noout -subject -dates -issuer 2>&1 || echo "openssl check failed"
            echo '```'
          } 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
