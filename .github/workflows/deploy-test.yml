name: Deploy to Test

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, lkvitai-test]
    environment: test
    env:
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
      DOCKER_NETWORK_NAME: ${{ vars.DOCKER_NETWORK_NAME }}
      DB_CONTAINER_NAME: ${{ vars.DB_CONTAINER_NAME }}
      DB_CONTAINER_IMAGE: ${{ vars.DB_CONTAINER_IMAGE }}
      TEST_DB_NAME: ${{ vars.TEST_DB_NAME }}
      TEST_DB_USER: ${{ vars.TEST_DB_USER }}
      TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
      ITEMIMAGES__ENDPOINT: ${{ vars.ITEMIMAGES__ENDPOINT }}
      ITEMIMAGES__BUCKET: ${{ vars.ITEMIMAGES__BUCKET }}
      ITEMIMAGES__USESSL: ${{ vars.ITEMIMAGES__USESSL }}
      ITEMIMAGES__ACCESSKEY: ${{ secrets.ITEMIMAGES__ACCESSKEY }}
      ITEMIMAGES__SECRETKEY: ${{ secrets.ITEMIMAGES__SECRETKEY }}
      ITEMIMAGES__MODEL_PATH: ${{ vars.ITEMIMAGES__MODEL_PATH }}
      CLIP_MODEL_DIR: ${{ vars.CLIP_MODEL_DIR }}

    steps:
      - name: Fail fast if required env vars are missing or invalid
        run: |
          if [ -z "${TEST_DB_PASSWORD}" ]; then
            echo "::error::TEST_DB_PASSWORD is missing. Set it in GitHub Environment 'test'."
            exit 1
          fi
          if [ -z "${ITEMIMAGES__MODEL_PATH}" ]; then
            echo "::error::ITEMIMAGES__MODEL_PATH is missing. Set it in GitHub Environment 'test'."
            exit 1
          fi
          if [ -z "${CLIP_MODEL_DIR}" ]; then
            echo "::error::CLIP_MODEL_DIR is missing. Set it in GitHub Environment 'test'."
            exit 1
          fi
          if [ "${CLIP_MODEL_DIR}" = "/tmp/models" ] || [[ "${CLIP_MODEL_DIR}" == /tmp/* ]]; then
            echo "::error::CLIP_MODEL_DIR points to /tmp, which is ephemeral after reboot/cleanup. Use a persistent path, e.g. /opt/lkvitai-mes/models."
            exit 1
          fi

      - name: Clean workspace (fix root-owned files from Docker)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            alpine:3 \
            sh -c "rm -rf /workspace/*"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure deploy Docker network exists
        run: |
          docker network inspect "$DOCKER_NETWORK_NAME" >/dev/null 2>&1 || \
            docker network create "$DOCKER_NETWORK_NAME"

      - name: Ensure host bind-mount directories exist with correct ownership
        run: |
          set -euo pipefail
          # All four containers (api / webui / portal-api / portal-webui)
          # run as the standard .NET 8 `app` user (uid 1654, gid 1654 — see
          # their Dockerfiles). The two host bind-mounts referenced by
          # docker-compose.test.yml must therefore be writable by that uid,
          # otherwise the runtime fails on first write:
          #   * /app/auth-keys (WebUI) → DataProtection key ring. Missing
          #     writability → CryptographicException → login redirect loop.
          #   * /app/logs (warehouse-api + portal-webui share one host dir)
          #     → Serilog daily-rolled warehouse-YYYYMMDD.log /
          #     portal-YYYYMMDD.log file sinks; filename prefixes already
          #     disambiguate so no per-service subdir is needed.
          # Defaults mirror the ${VAR:-default} fall-throughs in
          # docker-compose.test.yml so a fresh self-hosted runner can come
          # up cold without any manual chmod/chown.
          AUTH_KEYS_DIR="${AUTH_KEYS_DIR:-/opt/lkvitai-mes/auth-keys}"
          LOGS_DIR="${LOGS_DIR:-/opt/lkvitai-mes/logs}"

          # The runner user (`actions-runner`) does not have passwordless
          # sudo, and may not have write access under /opt/lkvitai-mes/
          # for every subdir. Try to mkdir best-effort (so a fully fresh
          # host gets the dirs created when possible) but tolerate failures
          # when the dirs already exist root-owned — the Docker chown right
          # after is the real fixer. If the dirs neither exist nor can be
          # created, `docker run -v` will fail loudly with a clear error.
          mkdir -p "$AUTH_KEYS_DIR" 2>/dev/null || true
          mkdir -p "$LOGS_DIR" 2>/dev/null || true

          # auth-keys → 0700 (private DataProtection material).
          # logs      → 0755 so a future read-only Vector mount can tail.
          docker run --rm \
            --user 0:0 \
            -v "$AUTH_KEYS_DIR:/mnt/auth-keys" \
            -v "$LOGS_DIR:/mnt/logs" \
            alpine:3.20 \
            sh -eu -c '
              chown -R 1654:1654 /mnt/auth-keys /mnt/logs
              chmod 700 /mnt/auth-keys
              chmod 755 /mnt/logs
            '
        env:
          AUTH_KEYS_DIR: ${{ vars.AUTH_KEYS_DIR }}
          LOGS_DIR: ${{ vars.LOGS_DIR }}

      - name: Ensure test PostgreSQL container exists and is running
        run: |
          if docker ps -a --format '{{.Names}}' | grep -Fx "$DB_CONTAINER_NAME" >/dev/null; then
            if [ "$(docker inspect -f '{{.State.Running}}' "$DB_CONTAINER_NAME")" != "true" ]; then
              docker start "$DB_CONTAINER_NAME"
            fi
          else
            docker run -d --name "$DB_CONTAINER_NAME" \
              --restart unless-stopped \
              --network "$DOCKER_NETWORK_NAME" \
              --network-alias pg \
              -e POSTGRES_DB="$TEST_DB_NAME" \
              -e POSTGRES_USER="$TEST_DB_USER" \
              -e POSTGRES_PASSWORD="$TEST_DB_PASSWORD" \
              "$DB_CONTAINER_IMAGE"
          fi

      - name: Ensure DB container is on deploy network with 'pg' alias
        run: |
          # Always disconnect + reconnect to guarantee the 'pg' alias is present.
          # The alias can be lost after Docker daemon restarts or network recreation,
          # and the previous logic skipped reconnection when the container was already
          # on the network — even if the alias was missing.
          docker network disconnect "$DOCKER_NETWORK_NAME" "$DB_CONTAINER_NAME" 2>/dev/null || true
          echo "Connecting $DB_CONTAINER_NAME to $DOCKER_NETWORK_NAME with alias pg..."
          docker network connect --alias pg "$DOCKER_NETWORK_NAME" "$DB_CONTAINER_NAME"

      - name: Pull new images
        run: docker compose -f docker-compose.test.yml pull

      - name: Check database connection
        run: |
          echo "Checking PostgreSQL connectivity (local)..."
          ready=0
          for i in $(seq 1 10); do
            if docker exec "$DB_CONTAINER_NAME" pg_isready -U "$TEST_DB_USER" > /dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              ready=1
              break
            fi
            echo "  attempt $i/10 — not ready yet"
            sleep 3
          done
          if [ "$ready" -ne 1 ]; then
            echo "PostgreSQL failed to become ready"
            exit 1
          fi

      - name: Verify DB reachable via network alias 'pg'
        run: |
          echo "Checking pg alias resolves on $DOCKER_NETWORK_NAME..."
          for i in $(seq 1 5); do
            if docker run --rm --network "$DOCKER_NETWORK_NAME" \
                 postgres:16-alpine pg_isready -h pg -U "$TEST_DB_USER" > /dev/null 2>&1; then
              echo "pg alias is reachable!"
              exit 0
            fi
            echo "  attempt $i/5 — pg not reachable yet"
            sleep 3
          done
          echo "::error::Cannot reach PostgreSQL via 'pg' alias on network $DOCKER_NETWORK_NAME"
          exit 1

      - name: Clean up leftover migration container
        run: docker rm -f lkvitai-mes-migration 2>/dev/null || true

      - name: Apply EF Core migrations to test DB
        run: |
          docker run --rm --name lkvitai-mes-migration \
            --network "$DOCKER_NETWORK_NAME" \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            -e HOME=/tmp \
            -e DOTNET_CLI_HOME=/tmp/.dotnet \
            -e "ConnectionStrings__WarehouseDb=Host=pg;Port=5432;Database=$TEST_DB_NAME;Username=$TEST_DB_USER;Password=$TEST_DB_PASSWORD" \
            mcr.microsoft.com/dotnet/sdk:8.0 \
            bash -c '
              set -e
              dotnet tool install --global dotnet-ef
              export PATH="$PATH:/tmp/.dotnet/.dotnet/tools"
              dotnet build src/Modules/Warehouse/LKvitai.MES.Modules.Warehouse.Api/LKvitai.MES.Modules.Warehouse.Api.csproj -c Release
              for attempt in 1 2 3; do
                echo "Migration attempt $attempt/3..."
                if dotnet ef database update \
                  --project src/Modules/Warehouse/LKvitai.MES.Modules.Warehouse.Infrastructure \
                  --startup-project src/Modules/Warehouse/LKvitai.MES.Modules.Warehouse.Api \
                  --no-build \
                  --configuration Release; then
                  echo "Migration succeeded on attempt $attempt"
                  exit 0
                fi
                if [ "$attempt" -lt 3 ]; then
                  echo "Migration failed, retrying in $((attempt * 5))s..."
                  sleep $((attempt * 5))
                fi
              done
              echo "Migration failed after 3 attempts"
              exit 1
            '

      - name: Deploy containers
        run: IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose -f docker-compose.test.yml up -d

      - name: Wait for API health
        run: |
          echo "Waiting for API to become healthy..."
          for i in $(seq 1 30); do
            if docker exec lkvitai-mes-warehouse-api curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "API is healthy!"
              exit 0
            fi
            echo "  attempt $i/30 — not ready yet"
            sleep 5
          done
          echo "API failed to become healthy within 150s"
          docker compose -f docker-compose.test.yml logs api --tail 50
          exit 1

      - name: Wait for Portal API health
        run: |
          echo "Waiting for Portal API to become healthy..."
          for i in $(seq 1 30); do
            if docker exec lkvitai-mes-portal-api curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Portal API is healthy!"
              exit 0
            fi
            echo "  attempt $i/30 — not ready yet"
            sleep 5
          done
          echo "Portal API failed to become healthy within 150s"
          docker compose -f docker-compose.test.yml logs portal-api --tail 50
          exit 1

      - name: Wait for Warehouse WebUI health
        run: |
          echo "Waiting for Warehouse WebUI to become healthy..."
          for i in $(seq 1 30); do
            if docker exec lkvitai-mes-warehouse-webui curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Warehouse WebUI is healthy!"
              exit 0
            fi
            echo "  attempt $i/30 — not ready yet"
            sleep 5
          done
          echo "Warehouse WebUI failed to become healthy within 150s"
          docker compose -f docker-compose.test.yml logs webui --tail 50
          exit 1

      - name: Wait for scaffolded module containers to become healthy
        run: |
          set -euo pipefail
          # Six scaffolded containers (3 modules × {api, webui}) share the same
          # /health contract as warehouse/portal. Iterate so we fail fast with
          # useful logs on the first one that doesn't come up.
          for container in \
            lkvitai-mes-sales-api \
            lkvitai-mes-sales-webui \
            lkvitai-mes-frontline-api \
            lkvitai-mes-frontline-webui \
            lkvitai-mes-scanning-api \
            lkvitai-mes-scanning-webui ; do
            echo "Waiting for ${container} health..."
            ok=0
            for i in $(seq 1 30); do
              if docker exec "${container}" curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "${container} is healthy."
                ok=1
                break
              fi
              echo "  attempt $i/30 — ${container} not ready yet"
              sleep 5
            done
            if [ "$ok" -ne 1 ]; then
              echo "::error::${container} failed to become healthy within 150s"
              docker compose -f docker-compose.test.yml logs "${container#lkvitai-mes-}" --tail 80 || true
              exit 1
            fi
          done

      - name: Seed master data
        run: |
          docker exec -i "$DB_CONTAINER_NAME" \
            psql -U "$TEST_DB_USER" -d "$TEST_DB_NAME" \
            < scripts/seed-master-data.sql

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag:** ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Warehouse API:** lkvitai-test:5001" >> $GITHUB_STEP_SUMMARY
          echo "- **Warehouse WebUI:** lkvitai-test:5000" >> $GITHUB_STEP_SUMMARY
          echo "- **Portal API:** lkvitai-test:5011" >> $GITHUB_STEP_SUMMARY
          echo "- **Portal WebUI:** lkvitai-test:5010" >> $GITHUB_STEP_SUMMARY
          echo "- **Sales API (scaffold):** lkvitai-test:5021" >> $GITHUB_STEP_SUMMARY
          echo "- **Sales WebUI (scaffold):** lkvitai-test:5020" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontline API (scaffold):** lkvitai-test:5031" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontline WebUI (scaffold):** lkvitai-test:5030" >> $GITHUB_STEP_SUMMARY
          echo "- **Scanning API (scaffold):** lkvitai-test:5041" >> $GITHUB_STEP_SUMMARY
          echo "- **Scanning WebUI (scaffold):** lkvitai-test:5040" >> $GITHUB_STEP_SUMMARY
          docker compose -f docker-compose.test.yml ps >> $GITHUB_STEP_SUMMARY
