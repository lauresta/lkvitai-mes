name: Shopfloor CI

on:
  pull_request:
    branches:
      - main
    paths:
      - src/Modules/Shopfloor/**
      - tests/Modules/Shopfloor/**
      - src/BuildingBlocks/**
      - .github/workflows/shopfloor-ci.yml

permissions:
  contents: read

jobs:
  shopfloor-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/LKvitai.MES.sln

      - name: Build Shopfloor Contracts
        run: dotnet build src/Modules/Shopfloor/LKvitai.MES.Modules.Shopfloor.Contracts/LKvitai.MES.Modules.Shopfloor.Contracts.csproj -c Release --no-restore

      - name: Build Shopfloor Domain
        run: dotnet build src/Modules/Shopfloor/LKvitai.MES.Modules.Shopfloor.Domain/LKvitai.MES.Modules.Shopfloor.Domain.csproj -c Release --no-restore

      - name: Build Shopfloor Application
        run: dotnet build src/Modules/Shopfloor/LKvitai.MES.Modules.Shopfloor.Application/LKvitai.MES.Modules.Shopfloor.Application.csproj -c Release --no-restore

      - name: Build Shopfloor Infrastructure
        run: dotnet build src/Modules/Shopfloor/LKvitai.MES.Modules.Shopfloor.Infrastructure/LKvitai.MES.Modules.Shopfloor.Infrastructure.csproj -c Release --no-restore

      - name: Build Shopfloor API
        run: dotnet build src/Modules/Shopfloor/LKvitai.MES.Modules.Shopfloor.Api/LKvitai.MES.Modules.Shopfloor.Api.csproj -c Release --no-restore

      - name: Build Shopfloor WebUI
        run: dotnet build src/Modules/Shopfloor/LKvitai.MES.Modules.Shopfloor.WebUI/LKvitai.MES.Modules.Shopfloor.WebUI.csproj -c Release --no-restore

      - name: Test Shopfloor Unit
        run: dotnet test tests/Modules/Shopfloor/LKvitai.MES.Tests.Shopfloor.Unit/LKvitai.MES.Tests.Shopfloor.Unit.csproj -c Release --no-restore

      # MCR occasionally returns 403 on anonymous HEAD /v2/.../manifests/... during
      # BuildKit metadata resolution. Pulling the base images with retries up front
      # lets the subsequent `docker build` use the local cache instead of hitting MCR.
      - name: Prefetch .NET 8 base images (retry on MCR 403)
        shell: bash
        run: |
          set -u
          for image in mcr.microsoft.com/dotnet/sdk:8.0 mcr.microsoft.com/dotnet/aspnet:8.0; do
            echo "Pulling ${image} ..."
            attempts=0
            until docker pull "${image}"; do
              attempts=$((attempts + 1))
              if [ ${attempts} -ge 5 ]; then
                echo "::error::Failed to pull ${image} after ${attempts} attempts"
                exit 1
              fi
              wait=$((attempts * 10))
              echo "pull ${image} failed, retrying in ${wait}s..."
              sleep ${wait}
            done
          done

      - name: Docker build Shopfloor API
        run: docker build -f src/Modules/Shopfloor/LKvitai.MES.Modules.Shopfloor.Api/Dockerfile -t lkvitai-mes-shopfloor-api:ci .

      - name: Docker build Shopfloor WebUI
        run: docker build -f src/Modules/Shopfloor/LKvitai.MES.Modules.Shopfloor.WebUI/Dockerfile -t lkvitai-mes-shopfloor-webui:ci .
