name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - src/Modules/Warehouse/**
      - src/Modules/Portal/**
      - src/Modules/Sales/**
      - src/Modules/Frontline/**
      - src/Modules/Scanning/**
      - src/BuildingBlocks/**
      - docker-compose.test.yml
      - .github/workflows/build-and-push.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: src/Modules/Warehouse/LKvitai.MES.Modules.Warehouse.Api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-warehouse-api
          - name: webui
            dockerfile: src/Modules/Warehouse/LKvitai.MES.Modules.Warehouse.WebUI/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-warehouse-webui
          - name: portal-api
            dockerfile: src/Modules/Portal/LKvitai.MES.Modules.Portal.Api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-portal-api
          - name: portal-webui
            dockerfile: src/Modules/Portal/LKvitai.MES.Modules.Portal.WebUI/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-portal-webui
          - name: sales-api
            dockerfile: src/Modules/Sales/LKvitai.MES.Modules.Sales.Api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-sales-api
          - name: sales-webui
            dockerfile: src/Modules/Sales/LKvitai.MES.Modules.Sales.WebUI/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-sales-webui
          - name: frontline-api
            dockerfile: src/Modules/Frontline/LKvitai.MES.Modules.Frontline.Api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-frontline-api
          - name: frontline-webui
            dockerfile: src/Modules/Frontline/LKvitai.MES.Modules.Frontline.WebUI/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-frontline-webui
          - name: scanning-api
            dockerfile: src/Modules/Scanning/LKvitai.MES.Modules.Scanning.Api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-scanning-api
          - name: scanning-webui
            dockerfile: src/Modules/Scanning/LKvitai.MES.Modules.Scanning.WebUI/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-scanning-webui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=long

      # MCR occasionally returns 403 on anonymous HEAD /v2/.../manifests/... during
      # BuildKit metadata resolution. Probe both .NET base images with retries before
      # starting the expensive matrix build so transient registry failures do not
      # immediately cancel every image publish job.
      - name: Verify .NET 8 base images are reachable
        shell: bash
        run: |
          set -u
          for image in mcr.microsoft.com/dotnet/sdk:8.0 mcr.microsoft.com/dotnet/aspnet:8.0; do
            echo "Checking ${image} ..."
            attempts=0
            until docker buildx imagetools inspect "${image}" >/dev/null; do
              attempts=$((attempts + 1))
              if [ ${attempts} -ge 5 ]; then
                echo "::error::Failed to resolve ${image} after ${attempts} attempts"
                exit 1
              fi
              wait=$((attempts * 10))
              echo "resolve ${image} failed, retrying in ${wait}s..."
              sleep ${wait}
            done
          done

      # Build the image with up to 3 attempts.
      #
      # The probe step above already retries `imagetools inspect` 5 times,
      # but BuildKit (running inside the docker-container driver) keeps its
      # own short-lived manifest cache and re-issues a HEAD against MCR when
      # the actual build kicks off. When MCR's Front Door is moody (we have
      # seen this twice in two days, https://github.com/lauresta/lkvitai-mes/issues/85)
      # it returns HTML 403 instead of a manifest, the action has no built-in
      # retry, and the matrix entry dies — forcing a manual `gh run rerun`
      # before main can move forward.
      #
      # The pattern below retries the EXACT SAME action invocation up to two
      # additional times with growing back-off (30s, 60s). Each attempt is
      # gated on the previous one having failed, so a successful first pass
      # adds zero latency. The final attempt drops `continue-on-error` so a
      # genuine, persistent failure still fails the matrix entry within
      # ~3 min of wait + 3 attempts of build time, matching the budget on
      # issue #85.
      # Build metadata surfaced by GET /api/portal/v1/status. Forwarded as
      # build-args to every image — only Portal.Api currently consumes them
      # (Dockerfile ARGs are no-ops in images that don't declare them, so
      # the extra inputs are harmless for warehouse-api / sales-api / etc.).
      # GIT_SHA = full commit SHA (matches the image tag from
      # docker/metadata-action's type=sha,format=long entry).
      # BUILD_DATE = ISO-8601 UTC stamp captured at workflow start.
      # APP_VERSION = best-effort version: the latest git tag if any,
      # otherwise the short SHA. RELEASE_TAG mirrors APP_VERSION today
      # because we don't yet cut named releases; the slot stays so
      # release-driven tagging plugs in without an API contract change.
      - name: Capture build metadata
        id: meta_build
        shell: bash
        run: |
          set -u
          GIT_SHA="${GITHUB_SHA}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          APP_VERSION="$(git describe --tags --always 2>/dev/null || echo "${GIT_SHA:0:7}")"
          RELEASE_TAG="${APP_VERSION}"
          {
            echo "git_sha=${GIT_SHA}"
            echo "build_date=${BUILD_DATE}"
            echo "app_version=${APP_VERSION}"
            echo "release_tag=${RELEASE_TAG}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push ${{ matrix.name }} image (attempt 1/3)
        id: build1
        continue-on-error: true
        # Pinned to a commit SHA (v5.4.0) per Sonar githubactions:S7637 — protects
        # the CI/CD pipeline from a potential supply-chain compromise of the
        # docker/build-push-action repo. Bump when you intentionally upgrade.
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta_build.outputs.app_version }}
            RELEASE_TAG=${{ steps.meta_build.outputs.release_tag }}
            GIT_SHA=${{ steps.meta_build.outputs.git_sha }}
            BUILD_DATE=${{ steps.meta_build.outputs.build_date }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Wait before retry (attempt 2)
        if: steps.build1.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::attempt 1 failed, sleeping 30s before retry"
          sleep 30

      - name: Build and push ${{ matrix.name }} image (attempt 2/3)
        id: build2
        if: steps.build1.outcome == 'failure'
        continue-on-error: true
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta_build.outputs.app_version }}
            RELEASE_TAG=${{ steps.meta_build.outputs.release_tag }}
            GIT_SHA=${{ steps.meta_build.outputs.git_sha }}
            BUILD_DATE=${{ steps.meta_build.outputs.build_date }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Wait before retry (attempt 3)
        if: steps.build1.outcome == 'failure' && steps.build2.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::attempts 1 and 2 failed, sleeping 60s before final retry"
          sleep 60

      # Final attempt — no continue-on-error so a sustained outage still fails
      # the matrix entry. This is the step whose outcome the job exit code
      # ultimately reports against.
      - name: Build and push ${{ matrix.name }} image (attempt 3/3, final)
        if: steps.build1.outcome == 'failure' && steps.build2.outcome == 'failure'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta_build.outputs.app_version }}
            RELEASE_TAG=${{ steps.meta_build.outputs.release_tag }}
            GIT_SHA=${{ steps.meta_build.outputs.git_sha }}
            BUILD_DATE=${{ steps.meta_build.outputs.build_date }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
