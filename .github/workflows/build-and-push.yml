name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - src/Modules/Warehouse/**
      - src/Modules/Portal/**
      - src/Modules/Sales/**
      - src/Modules/Frontline/**
      - src/Modules/Scanning/**
      - src/BuildingBlocks/**
      - docker-compose.test.yml
      - .github/workflows/build-and-push.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: src/Modules/Warehouse/LKvitai.MES.Modules.Warehouse.Api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-warehouse-api
          - name: webui
            dockerfile: src/Modules/Warehouse/LKvitai.MES.Modules.Warehouse.WebUI/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-warehouse-webui
          - name: portal-api
            dockerfile: src/Modules/Portal/LKvitai.MES.Modules.Portal.Api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-portal-api
          - name: portal-webui
            dockerfile: src/Modules/Portal/LKvitai.MES.Modules.Portal.WebUI/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-portal-webui
          - name: sales-api
            dockerfile: src/Modules/Sales/LKvitai.MES.Modules.Sales.Api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-sales-api
          - name: sales-webui
            dockerfile: src/Modules/Sales/LKvitai.MES.Modules.Sales.WebUI/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-sales-webui
          - name: frontline-api
            dockerfile: src/Modules/Frontline/LKvitai.MES.Modules.Frontline.Api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-frontline-api
          - name: frontline-webui
            dockerfile: src/Modules/Frontline/LKvitai.MES.Modules.Frontline.WebUI/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-frontline-webui
          - name: scanning-api
            dockerfile: src/Modules/Scanning/LKvitai.MES.Modules.Scanning.Api/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-scanning-api
          - name: scanning-webui
            dockerfile: src/Modules/Scanning/LKvitai.MES.Modules.Scanning.WebUI/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/lkvitai-mes-scanning-webui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=long

      # MCR occasionally returns 403 on anonymous HEAD /v2/.../manifests/... during
      # BuildKit metadata resolution. Probe both .NET base images with retries before
      # starting the expensive matrix build so transient registry failures do not
      # immediately cancel every image publish job.
      - name: Verify .NET 8 base images are reachable
        shell: bash
        run: |
          set -u
          for image in mcr.microsoft.com/dotnet/sdk:8.0 mcr.microsoft.com/dotnet/aspnet:8.0; do
            echo "Checking ${image} ..."
            attempts=0
            until docker buildx imagetools inspect "${image}" >/dev/null; do
              attempts=$((attempts + 1))
              if [ ${attempts} -ge 5 ]; then
                echo "::error::Failed to resolve ${image} after ${attempts} attempts"
                exit 1
              fi
              wait=$((attempts * 10))
              echo "resolve ${image} failed, retrying in ${wait}s..."
              sleep ${wait}
            done
          done

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
