# SonarCloud analysis configuration (Automatic Analysis).
# Auto-generated EF Core migrations + model snapshots are inherently repetitive
# (each Designer embeds a full BuildTargetModel that mirrors the snapshot), so they
# must be excluded from duplicate-code detection to keep the "Duplication on New Code"
# quality gate meaningful for hand-written code.
sonar.cpd.exclusions=**/Persistence/Migrations/**/*.cs
