# SonarCloud Automatic Analysis configuration.
# (Automatic Analysis reads .sonarcloud.properties, not sonar-project.properties.)
#
# Auto-generated EF Core migrations, their .Designer.cs files, and the model
# snapshot are inherently repetitive: every Designer embeds a full BuildTargetModel
# that mirrors WarehouseDbContextModelSnapshot.cs. Exclude them from copy-paste
# detection so the "Duplication on New Code" quality gate reflects hand-written code.
sonar.cpd.exclusions=**/Persistence/Migrations/**/*
