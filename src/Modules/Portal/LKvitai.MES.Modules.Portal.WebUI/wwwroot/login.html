<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - LKvitai.MES</title>
  <link rel="stylesheet" href="/styles.css?v=0.1.5">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel" aria-labelledby="login-title">
      <div class="login-brand">
        <div class="brand__mark">LK</div>
        <div>
          <h1 id="login-title">LKvitai<span>.MES</span></h1>
          <p>Portal sign in</p>
        </div>
      </div>

      <p class="login-error" id="login-error" hidden>Invalid username or password.</p>

      <form class="login-form" action="/auth/login" method="post">
        <input id="return-url" type="hidden" name="returnUrl" value="/">

        <label>
          <span>Username</span>
          <input name="username" autocomplete="username" autofocus required>
        </label>

        <label>
          <span>Password</span>
          <input name="password" type="password" autocomplete="current-password" required>
        </label>

        <button class="button button--primary" type="submit">Login</button>
      </form>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get("returnUrl");
    if (returnUrl && returnUrl.startsWith("/") && !returnUrl.startsWith("//")) {
      document.querySelector("#return-url").value = returnUrl;
    }
    document.querySelector("#login-error").hidden = params.get("error") !== "invalid";
  </script>
</body>
</html>
