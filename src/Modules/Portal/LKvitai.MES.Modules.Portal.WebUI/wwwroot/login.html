<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Cikada.MES</title>
  <link rel="icon" type="image/png" sizes="32x32" href="_content/LKvitai.MES.BuildingBlocks.WebUI/brand/favicon-32.png?v=0.1.5">
  <link rel="icon" type="image/png" sizes="16x16" href="_content/LKvitai.MES.BuildingBlocks.WebUI/brand/favicon-16.png?v=0.1.5">
  <link rel="apple-touch-icon" sizes="180x180" href="_content/LKvitai.MES.BuildingBlocks.WebUI/brand/icon-180.png?v=0.1.5">
  <link rel="manifest" href="_content/LKvitai.MES.BuildingBlocks.WebUI/brand/site.webmanifest?v=0.1.5">
  <meta name="theme-color" content="#2f8f8b">
  <link rel="stylesheet" href="css/fonts.css?v=0.1.5">
  <link rel="stylesheet" href="_content/LKvitai.MES.BuildingBlocks.WebUI/css/portal-tokens.css?v=0.1.5">
  <link rel="stylesheet" href="styles.css?v=0.1.5">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel" aria-labelledby="login-title">
      <div class="login-brand">
        <div class="brand__mark" aria-hidden="true">
          <svg class="brand__mark-icon" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" focusable="false">
            <path d="M12 15 C22 12.5 30 15.5 32 21"></path>
            <path d="M11 21 C21 19 28.5 22 31 27"></path>
            <circle cx="9" cy="18.5" r="2.8" fill="currentColor" stroke="none"></circle>
          </svg>
        </div>
        <div>
          <h1 id="login-title"><span class="brand__wordmark">Cikada</span><span class="brand__suffix">.MES</span></h1>
          <p>Portal sign in</p>
        </div>
      </div>

      <p class="login-error" id="login-error" role="alert" hidden></p>

      <form class="login-form" action="auth/login" method="post">
        <input id="return-url" type="hidden" name="returnUrl" value="/">

        <label>
          <span>Username</span>
          <input name="username" type="text" autocomplete="username" autofocus required>
        </label>

        <label>
          <span>Password</span>
          <input name="password" type="password" autocomplete="current-password" required>
        </label>

        <button class="button button--primary" type="submit">Login</button>
      </form>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(globalThis.location.search);
    const returnUrl = params.get("returnUrl");
    if (returnUrl && returnUrl.startsWith("/") && !returnUrl.startsWith("//")) {
      document.querySelector("#return-url").value = returnUrl;
    }

    const errorMessages = {
      invalid: "Invalid username or password.",
      unreachable: "Could not reach the authentication server. Please try again in a moment.",
      server: "Authentication server returned an error. Contact an administrator if it keeps happening.",
    };
    const errorEl = document.querySelector("#login-error");
    const errorCode = params.get("error");
    if (errorCode && Object.prototype.hasOwnProperty.call(errorMessages, errorCode)) {
      errorEl.textContent = errorMessages[errorCode];
      errorEl.hidden = false;
    } else {
      errorEl.hidden = true;
    }
  </script>
</body>
</html>
