# Test environment — routers, middlewares, services for cikada.test.lauresta.com
# (the official brand for the test environment) and its alias lkvitai.lauresta.com
# (Cloudflare CNAME). The legacy mes-test.lauresta.com hostname now permanently
# redirects to cikada.test.lauresta.com (see mes-test-legacy-redirect below) -
# it no longer serves content directly.
#
# Path-based routing under both hostnames. API prefixes are stripped before
# forwarding so each module's ASP.NET Core host only sees its own routes.
# Scaffolded modules (Sales/Frontline/Scanning/Shopfloor) mirror the
# Warehouse/Portal routing pattern exactly.
http:
  routers:
    mes-test-legacy-redirect:
      # mes-test.lauresta.com is the old hostname; cikada.test.lauresta.com is
      # the new official brand. Redirect the whole host, every path, so old
      # links/bookmarks keep working. No PathPrefix/Path constraint needed -
      # mes-test.lauresta.com is otherwise absent from every router below, so
      # this is the only router that can match that host.
      rule: "Host(`mes-test.lauresta.com`)"
      entryPoints: [websecure]
      middlewares: [mes-test-legacy-redirect-to-cikada]
      service: mes-test-portal-webui
      priority: 300
      tls:
        certResolver: letsencrypt

    mes-test-portal-root:
      rule: "(Host(`cikada.test.lauresta.com`) || Host(`lkvitai.lauresta.com`)) && Path(`/`)"
      entryPoints: [websecure]
      middlewares: [mes-test-redirect-root-to-portal]
      service: mes-test-portal-webui
      priority: 10
      tls:
        certResolver: letsencrypt

    mes-test-portal:
      rule: "(Host(`cikada.test.lauresta.com`) || Host(`lkvitai.lauresta.com`)) && PathPrefix(`/portal`)"
      entryPoints: [websecure]
      service: mes-test-portal-webui
      priority: 100
      tls:
        certResolver: letsencrypt

    mes-test-warehouse:
      rule: "(Host(`cikada.test.lauresta.com`) || Host(`lkvitai.lauresta.com`)) && PathPrefix(`/warehouse`)"
      entryPoints: [websecure]
      service: mes-test-warehouse-webui
      priority: 100
      tls:
        certResolver: letsencrypt

    mes-test-sales:
      rule: "(Host(`cikada.test.lauresta.com`) || Host(`lkvitai.lauresta.com`)) && PathPrefix(`/sales`)"
      entryPoints: [websecure]
      service: mes-test-sales-webui
      priority: 100
      tls:
        certResolver: letsencrypt

    mes-test-frontline:
      rule: "(Host(`cikada.test.lauresta.com`) || Host(`lkvitai.lauresta.com`)) && PathPrefix(`/frontline`)"
      entryPoints: [websecure]
      service: mes-test-frontline-webui
      priority: 100
      tls:
        certResolver: letsencrypt

    mes-test-scan:
      rule: "(Host(`cikada.test.lauresta.com`) || Host(`lkvitai.lauresta.com`)) && PathPrefix(`/scan`)"
      entryPoints: [websecure]
      service: mes-test-scanning-webui
      priority: 100
      tls:
        certResolver: letsencrypt

    mes-test-shopfloor:
      rule: "(Host(`cikada.test.lauresta.com`) || Host(`lkvitai.lauresta.com`)) && PathPrefix(`/shopfloor`)"
      entryPoints: [websecure]
      service: mes-test-shopfloor-webui
      priority: 100
      tls:
        certResolver: letsencrypt

    mes-test-api-portal:
      rule: "(Host(`cikada.test.lauresta.com`) || Host(`lkvitai.lauresta.com`)) && PathPrefix(`/api/portal`)"
      entryPoints: [websecure]
      middlewares: [mes-test-strip-api-portal]
      service: mes-test-portal-api
      priority: 200
      tls:
        certResolver: letsencrypt

    mes-test-api-warehouse:
      rule: "(Host(`cikada.test.lauresta.com`) || Host(`lkvitai.lauresta.com`)) && PathPrefix(`/api/warehouse`)"
      entryPoints: [websecure]
      middlewares: [mes-test-strip-api-warehouse]
      service: mes-test-warehouse-api
      priority: 200
      tls:
        certResolver: letsencrypt

    mes-test-api-sales:
      rule: "(Host(`cikada.test.lauresta.com`) || Host(`lkvitai.lauresta.com`)) && PathPrefix(`/api/sales`)"
      entryPoints: [websecure]
      service: mes-test-sales-api
      priority: 200
      tls:
        certResolver: letsencrypt

    mes-test-api-frontline:
      rule: "(Host(`cikada.test.lauresta.com`) || Host(`lkvitai.lauresta.com`)) && PathPrefix(`/api/frontline`)"
      entryPoints: [websecure]
      service: mes-test-frontline-api
      priority: 200
      tls:
        certResolver: letsencrypt

    mes-test-api-scan:
      rule: "(Host(`cikada.test.lauresta.com`) || Host(`lkvitai.lauresta.com`)) && PathPrefix(`/api/scan`)"
      entryPoints: [websecure]
      service: mes-test-scanning-api
      priority: 200
      tls:
        certResolver: letsencrypt

  middlewares:
    mes-test-legacy-redirect-to-cikada:
      redirectRegex:
        regex: "^https://mes-test\\.lauresta\\.com(/.*)?$"
        replacement: "https://cikada.test.lauresta.com${1}"
        permanent: true

    mes-test-redirect-root-to-portal:
      redirectRegex:
        regex: "^https://(cikada\\.test\\.lauresta\\.com|lkvitai\\.lauresta\\.com)/$"
        replacement: "https://${1}/portal/"
        permanent: false

    mes-test-strip-api-portal:
      stripPrefix:
        prefixes: [/api/portal]

    mes-test-strip-api-warehouse:
      stripPrefix:
        prefixes: [/api/warehouse]

    # Sales / Frontline / Scanning APIs receive the full /api/<module>/* path
    # so the MapGroup("/api/sales") etc. in each host's Program.cs matches as
    # declared. No stripPrefix middleware is needed, matching the group prefix
    # used by the app.

  services:
    mes-test-portal-webui:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.11.12.15:5010"

    mes-test-warehouse-webui:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.11.12.15:5000"

    mes-test-portal-api:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.11.12.15:5011"

    mes-test-warehouse-api:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.11.12.15:5001"

    mes-test-sales-webui:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.11.12.15:5020"

    mes-test-sales-api:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.11.12.15:5021"

    mes-test-frontline-webui:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.11.12.15:5030"

    mes-test-frontline-api:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.11.12.15:5031"

    mes-test-scanning-webui:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.11.12.15:5040"

    mes-test-scanning-api:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.11.12.15:5041"

    mes-test-shopfloor-webui:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://10.11.12.15:5050"
