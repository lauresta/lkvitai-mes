name: lkvitai-mes

services:
  api:
    image: ghcr.io/lauresta/lkvitai-mes-warehouse-api:${IMAGE_TAG:-latest}
    container_name: lkvitai-mes-warehouse-api
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Test
      UseJaegerExporter: "false"
      ConnectionStrings__WarehouseDb: "Host=pg;Port=5432;Database=lkvitai_warehouse_test;Username=postgres;Password=postgres"
      SkipSchemaValidation: "true"
      Caching__RedisConnectionString: "redis:6379,abortConnect=false,connectRetry=3,connectTimeout=1000,syncTimeout=1000"
      ITEMIMAGES__ENDPOINT: "${ITEMIMAGES__ENDPOINT}"
      ITEMIMAGES__BUCKET: "${ITEMIMAGES__BUCKET}"
      ITEMIMAGES__USESSL: "${ITEMIMAGES__USESSL:-false}"
      ITEMIMAGES__ACCESSKEY: "${ITEMIMAGES__ACCESSKEY}"
      ITEMIMAGES__SECRETKEY: "${ITEMIMAGES__SECRETKEY}"
      ITEMIMAGES__MAXUPLOADMB: "${ITEMIMAGES__MAXUPLOADMB:-5}"
      ITEMIMAGES__CACHEMAXAGESECONDS: "${ITEMIMAGES__CACHEMAXAGESECONDS:-86400}"
      ITEMIMAGES__MODEL_PATH: "${ITEMIMAGES__MODEL_PATH:-/models/item-image-model.onnx}"
    volumes:
      - ${LOGS_DIR:-/opt/lkvitai-mes/logs}:/app/logs
      - ${CLIP_MODEL_DIR:-/opt/lkvitai-mes/models}:/models:ro
    networks:
      - lkvitai-mes_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  webui:
    image: ghcr.io/lauresta/lkvitai-mes-warehouse-webui:${IMAGE_TAG:-latest}
    container_name: lkvitai-mes-warehouse-webui
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Test
      WarehouseApi__BaseUrl: "http://lkvitai-mes-warehouse-api:8080"
      PathBase: "/warehouse"
      PortalAuth__LoginBasePath: "/portal"
      PortalAuth__DataProtectionKeysPath: "/app/auth-keys"
    volumes:
      - ${AUTH_KEYS_DIR:-/opt/lkvitai-mes/auth-keys}:/app/auth-keys
    networks:
      - lkvitai-mes_default
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  portal-api:
    image: ghcr.io/lauresta/lkvitai-mes-portal-api:${IMAGE_TAG:-latest}
    container_name: lkvitai-mes-portal-api
    restart: unless-stopped
    ports:
      - "5011:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Test
      ConnectionStrings__PortalDb: "Host=pg;Port=5432;Database=${TEST_DB_NAME:-lkvitai_warehouse_test};Username=${TEST_DB_USER:-postgres};Password=${TEST_DB_PASSWORD}"
    networks:
      - lkvitai-mes_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  portal-webui:
    image: ghcr.io/lauresta/lkvitai-mes-portal-webui:${IMAGE_TAG:-latest}
    container_name: lkvitai-mes-portal-webui
    restart: unless-stopped
    ports:
      - "5010:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Test
      PortalApi__BaseUrl: "http://lkvitai-mes-portal-api:8080"
      WarehouseApi__BaseUrl: "http://lkvitai-mes-warehouse-api:8080"
      WarehouseWebUi__BaseUrl: "https://mes-test.lauresta.com/warehouse"
      PathBase: "/portal"
      PortalAuth__DataProtectionKeysPath: "/app/auth-keys"
    volumes:
      - ${AUTH_KEYS_DIR:-/opt/lkvitai-mes/auth-keys}:/app/auth-keys
      - ${LOGS_DIR:-/opt/lkvitai-mes/logs}:/app/logs
    networks:
      - lkvitai-mes_default
    depends_on:
      - portal-api

  # --- Sales module -------------------------------------------------------------
  # Uses the shared PortalAuth cookie (same auth-keys bind-mount, same cookie name)
  # so a user signed in via Portal is authenticated against the Sales API too.
  # S-2: Sales.Api now talks directly to the legacy SQL Server (LKvitaiDb — the
  # migrated MS Access database) via the weblb_* stored procedures. The
  # connection string is required — the deploy workflow fails fast if
  # LKVITAI_MSACCESS_DB_CONNECTION is empty, and Sales.Api itself refuses to
  # start without ConnectionStrings__LKvitaiDb.
  sales-api:
    image: ghcr.io/lauresta/lkvitai-mes-sales-api:${IMAGE_TAG:-latest}
    container_name: lkvitai-mes-sales-api
    restart: unless-stopped
    ports:
      - "5021:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Test
      PortalAuth__DataProtectionKeysPath: "/app/auth-keys"
      ConnectionStrings__LKvitaiDb: "${LKVITAI_MSACCESS_DB_CONNECTION}"
      Sales__OrdersDataSource: "Sql"
    volumes:
      - ${AUTH_KEYS_DIR:-/opt/lkvitai-mes/auth-keys}:/app/auth-keys
      - ${LOGS_DIR:-/opt/lkvitai-mes/logs}:/app/logs
    networks:
      - lkvitai-mes_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  sales-webui:
    image: ghcr.io/lauresta/lkvitai-mes-sales-webui:${IMAGE_TAG:-latest}
    container_name: lkvitai-mes-sales-webui
    restart: unless-stopped
    ports:
      - "5020:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Test
      SalesApi__BaseUrl: "http://lkvitai-mes-sales-api:8080"
      PathBase: "/sales"
      PortalAuth__LoginBasePath: "/portal"
      PortalAuth__DataProtectionKeysPath: "/app/auth-keys"
    volumes:
      - ${AUTH_KEYS_DIR:-/opt/lkvitai-mes/auth-keys}:/app/auth-keys
      - ${LOGS_DIR:-/opt/lkvitai-mes/logs}:/app/logs
    networks:
      - lkvitai-mes_default
    depends_on:
      - sales-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Frontline module (anonymous in F-2; PortalAuth lands in F-Auth) ---------
  # F-2.4: Frontline.Api defaults to FabricDataSource=Auto, so it talks to the
  # legacy SQL Server (LKvitaiDb) when the connection string is set, and
  # quietly falls back to the in-memory stub otherwise (with a Warning log).
  # The deploy workflow ships LKVITAI_MSACCESS_DB_CONNECTION as a secret —
  # mirror Sales here so /api/frontline/fabric/{code} and /api/frontline/fabric/low-stock
  # return real production data instead of the F-1 stub fixtures.
  frontline-api:
    image: ghcr.io/lauresta/lkvitai-mes-frontline-api:${IMAGE_TAG:-latest}
    container_name: lkvitai-mes-frontline-api
    restart: unless-stopped
    ports:
      - "5031:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Test
      ConnectionStrings__LKvitaiDb: "${LKVITAI_MSACCESS_DB_CONNECTION}"
      Frontline__FabricDataSource: "Sql"
    volumes:
      - ${LOGS_DIR:-/opt/lkvitai-mes/logs}:/app/logs
    networks:
      - lkvitai-mes_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontline-webui:
    image: ghcr.io/lauresta/lkvitai-mes-frontline-webui:${IMAGE_TAG:-latest}
    container_name: lkvitai-mes-frontline-webui
    restart: unless-stopped
    ports:
      - "5030:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Test
      FrontlineApi__BaseUrl: "http://lkvitai-mes-frontline-api:8080"
      PathBase: "/frontline"
      # #92 — Frontline.WebUI registers AddPortalCookieAuthentication so the
      # shared dark Portal topbar's user-block surfaces the real signed-in
      # admin name instead of the "Signed in" / "U" fallback. The cookie is
      # written by Portal.WebUI; for Frontline to decrypt it we have to:
      #   1. Pin the same DataProtection key ring (PortalAuth__DataProtectionKeysPath
      #      → /app/auth-keys, bind-mounted from $AUTH_KEYS_DIR on the host).
      #   2. Tell PortalAuth to redirect 401s back through the Portal login
      #      flow (PortalAuth__LoginBasePath="/portal"). Frontline doesn't
      #      enforce auth on any route, so this only fires if a future page
      #      adds [Authorize] — but wiring it now keeps Frontline aligned
      #      with Sales/Portal in case F-2.4 lands an authenticated route.
      PortalAuth__LoginBasePath: "/portal"
      PortalAuth__DataProtectionKeysPath: "/app/auth-keys"
    volumes:
      - ${AUTH_KEYS_DIR:-/opt/lkvitai-mes/auth-keys}:/app/auth-keys
      - ${LOGS_DIR:-/opt/lkvitai-mes/logs}:/app/logs
    networks:
      - lkvitai-mes_default
    depends_on:
      - frontline-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Scanning module (scaffold, anonymous) ------------------------------------
  scanning-api:
    image: ghcr.io/lauresta/lkvitai-mes-scanning-api:${IMAGE_TAG:-latest}
    container_name: lkvitai-mes-scanning-api
    restart: unless-stopped
    ports:
      - "5041:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Test
    volumes:
      - ${LOGS_DIR:-/opt/lkvitai-mes/logs}:/app/logs
    networks:
      - lkvitai-mes_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  scanning-webui:
    image: ghcr.io/lauresta/lkvitai-mes-scanning-webui:${IMAGE_TAG:-latest}
    container_name: lkvitai-mes-scanning-webui
    restart: unless-stopped
    ports:
      - "5040:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Test
      ScanningApi__BaseUrl: "http://lkvitai-mes-scanning-api:8080"
      PathBase: "/scan"
    volumes:
      - ${LOGS_DIR:-/opt/lkvitai-mes/logs}:/app/logs
    networks:
      - lkvitai-mes_default
    depends_on:
      - scanning-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  lkvitai-mes_default:
    external: true
